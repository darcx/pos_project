<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>enterprisePOS Portal Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md space-y-4">
        
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-black text-white tracking-wider">⚡ enterprisePOS</h1>
            <p class="text-xs text-gray-400 font-mono uppercase tracking-widest">Ayoub Hub Terminal Gateway</p>
        </div>

        <div id="alertBox"></div>

        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl space-y-4">
            
            <div class="grid grid-cols-2 gap-2 bg-slate-950 p-1 rounded-xl border border-slate-800 text-xs font-bold text-gray-400">
                <button id="loginTabBtn" onclick="toggleForm('login')" class="bg-blue-600 text-white py-2 rounded-lg transition-all">Sign In</button>
                <button id="registerTabBtn" onclick="toggleForm('register')" class="py-2 rounded-lg transition-all">Register Shop</button>
            </div>

            <form id="loginForm" action="/login" method="POST" class="space-y-3.5">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Account ID / Username</label>
                    <input type="text" name="username" required placeholder="e.g. admin, cashier, shop_name" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono font-bold text-white focus:outline-none focus:border-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Secure Password</label>
                    <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono font-bold text-white focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-xs tracking-wide transition shadow-lg">
                    Verify Credentials & Unlock Engine
                </button>
            </form>

            <form id="registerForm" action="/register" method="POST" class="space-y-3.5 hidden">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Registered Shop Entity Name</label>
                    <input type="text" name="username" required placeholder="e.g. Hanout_Ait_Melloul" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono font-bold text-white focus:outline-none focus:border-emerald-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Create Portal Password</label>
                    <input type="password" name="password" required placeholder="Choose a secure password" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono font-bold text-white focus:outline-none focus:border-emerald-500">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-xs tracking-wide transition shadow-lg">
                    ✨ Create Wholesale Account Matrix
                </button>
            </form>

        </div>
    </div>

    <script>
        // Smooth view toggling engine
        function toggleForm(mode) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginBtn = document.getElementById('loginTabBtn');
            const registerBtn = document.getElementById('registerTabBtn');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginBtn.className = "bg-blue-600 text-white py-2 rounded-lg transition-all";
                registerBtn.className = "py-2 rounded-lg transition-all text-gray-400";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginBtn.className = "py-2 rounded-lg transition-all text-gray-400";
                registerBtn.className = "bg-emerald-600 text-white py-2 rounded-lg transition-all";
            }
        }

        // Catch incoming system response banners via URL parameters
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const success = urlParams.get('success');
            const alertBox = document.getElementById('alertBox');

            if (error) {
                alertBox.innerHTML = `<div class="bg-rose-950/50 border border-rose-800 text-rose-400 text-xs px-4 py-2.5 rounded-xl text-center font-bold">${error.replace(/\+/g, ' ')}</div>`;
            } else if (success) {
                alertBox.innerHTML = `<div class="bg-emerald-950/50 border border-emerald-800 text-emerald-400 text-xs px-4 py-2.5 rounded-xl text-center font-bold">${success.replace(/\+/g, ' ')}</div>`;
            }
        }
    </script>
</body>
</html>
